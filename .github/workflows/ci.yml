name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build · Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint + typecheck
        run: pnpm turbo run lint typecheck

      - name: Build (api + web)
        run: pnpm turbo run build

      - name: Unit tests (jest + vitest)
        run: pnpm turbo run test

  rls-no-leak:
    name: rls-no-leak (RNF03 gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: adoptafacil
          POSTGRES_PASSWORD: adoptafacil
          POSTGRES_DB: adoptafacil
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adoptafacil -d adoptafacil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://adoptafacil:adoptafacil@localhost:5432/adoptafacil?schema=public
      DATABASE_URL_APP: postgresql://adoptafacil_app:adoptafacil_app@localhost:5432/adoptafacil?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations (creates tables, RLS policy, app role)
        run: pnpm prisma migrate deploy

      - name: Integration + RLS no-leak (smoke /health + cross-org isolation)
        run: pnpm --filter @adoptafacil/api run test:integration
