packages:
  - 'apps/*'
  - 'packages/*'

# Allowlist of dependencies permitted to run postinstall build scripts
# (native binaries / Prisma engine downloads). Recognized by pnpm 9.
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - msgpackr-extract
  - prisma
