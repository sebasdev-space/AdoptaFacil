packages:
  - 'apps/*'
  - 'packages/*'

# Allow postinstall build scripts only for these trusted dependencies
# (native binaries / engine downloads). pnpm blocks all others by default.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true

# Cross-version fallback (older/other pnpm builds read this key instead).
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - msgpackr-extract
  - prisma
